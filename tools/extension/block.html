<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slopblock Zero</title>
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png" />
    <style>
      html {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #d8e4ec;
        color: #0f0e0e;
        min-height: 100%;
        overflow-x: hidden;
      }
      /* Blurred rectangle backdrop (simple shapes, heavy blur) */
      .bg-backdrop {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .bg-backdrop-inner {
        position: absolute;
        inset: -12%;
        filter: blur(104px);
        opacity: 0.9;
        transform: translateZ(0);
      }
      .bg-rect {
        position: absolute;
      }
      /* https://yugioh.fandom.com/wiki/Dramatic_Crossroads */
      .bg-top-left {
        left: 0;
        top: 0;
        width: 50%;
        height: 50%;
        background: #bcc2c7;
      }
      .bg-top-right {
        right: 0;
        top: 0;
        width: 50%;
        height: 50%;
        background: #99a4ac;
      }
      .bg-bottom {
        left: 0;
        right: 0;
        top: 50%;
        bottom: 0;
        background: #aeb8b2;
      }
      .bg-road {
        left: 50%;
        top: 50%;
        width: calc(100% / 7);
        height: 50%;
        transform: translateX(-50%);
        background: #b9b8b4;
      }
      .wrap {
        position: relative;
        z-index: 1;
        box-sizing: border-box;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 24px 28px;
        text-align: left;
      }
      .content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        transform: translateY(-3vh);
        max-width: 100%;
      }
      .layout {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 24px;
        align-items: flex-start;
        justify-items: start;
      }
      .logo {
        width: 220px;
        height: 220px;
      }
      .message {
        max-width: 520px;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
        margin-bottom: 22px;
        align-self: center;
        justify-content: center;
      }
      .action-button {
        min-width: min(480px, 86vw);
        padding: 22px 36px;
        border-radius: 50px;
        border: 1px solid #2d2d2d;
        background: #ffffff; 
        color: #0f0e0e;
        font-size: 28px;
        cursor: pointer;
      }
      .action-button:focus {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }
      .messages-row {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-top: 8px;
        align-self: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 400;
        color: #252323;
      }
      .message-sep {
        width: 1px;
        height: 26px;
        background: #b5b5b5;
      }
      .messages-row a {
        color: #0f0e0e;
        text-decoration: underline;
      }
      .divider {
        height: 1px;
        background: #b5b5b5;
        margin: 16px 0;
      }
      h1 {
        font-size: clamp(28px, 4.2vw, 42px);
        font-weight: 400;
        margin-bottom: 16px;
        line-height: 1.2;
      }
      p {
        font-size: clamp(17px, 2.2vw, 22px);
        margin: 0 0 12px 0;
        line-height: 1.45;
      }
      b {
        color: #000000;
      }
    </style>
  </head>
  <body>
    <div class="bg-backdrop" aria-hidden="true">
      <div class="bg-backdrop-inner">
        <div class="bg-rect bg-top-left"></div>
        <div class="bg-rect bg-top-right"></div>
        <div class="bg-rect bg-bottom"></div>
        <div class="bg-rect bg-road"></div>
      </div>
    </div>
    <div class="wrap">
      <div class="content">
        <div class="layout">
          <img
            class="logo"
            src="icons/icon256.png"
            alt="Slopblock Zero icon"
          />
          <div class="message">
            <h1>This page was blocked by <strong>Slopblock Zero</strong>.</h1>
            <p id="block-explanation">
              The account you are trying to view was tagged by community members as an
              <strong>AI Slop Account</strong>.
            </p>
          </div>
        </div>
        <div class="actions">
          <button class="action-button" id="back-button" type="button"></button>
          <button class="action-button" id="proceed-button" type="button">Continue ⟶</button>
        </div>
        <div class="messages-row">
          <a id="why-link" href="#">Why am I seeing this? 🤔</a>
          <div class="message-sep" aria-hidden="true"> | </div>
          <a id="dispute-link" href="#">Was this account tagged incorrectly? 📝</a>
        </div>
      </div>
    </div>
    <script src="block.js"></script>
  </body>
</html>
